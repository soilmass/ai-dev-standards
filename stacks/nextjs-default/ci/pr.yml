# PR pipeline — runs on every pull request.
# Execution model (per 05-verification/ci-pipeline.md): sequential gating with
# parallel execution within each tier; unit tests + fast static checks first (fail fast),
# then build + preview-dependent gates.
#
# Tier 1 (parallel): lint+format, type check, unit/component tests (incl. a11y unit checks),
#                    secret scan, PR-size gate, dependency audit + license allowlist,
#                    supply-chain (SBOM + dependency review), migration-discipline guard,
#                    docs-updated check
# Tier 2 (after tier 1): production build
# Tier 3 (after tier 2): Lighthouse CI against the preview deploy; site-integrity
#                    crawl against a locally-served production build
#
# Requires repo secrets: VERCEL_PREVIEW (set automatically by the Vercel GitHub
# integration as a deployment) — the Lighthouse job waits for that deployment URL.

name: PR

on:
  pull_request:
    branches: [main]
    # labeled/unlabeled included so the docs job's 'no-docs-needed' waiver
    # re-evaluates when the label is toggled — without them the waiver is inert.
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  lint:
    name: Lint & format (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Biome check (lint + format + import order)
        run: pnpm exec biome ci .

  typecheck:
    name: Type check (tsc, strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  test:
    name: Unit + component tests (Vitest, a11y included)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Vitest with coverage gate
        run: pnpm exec vitest run --coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit in the PR
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-size:
    name: PR size gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fail PRs over the one-concern size budget
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
          LIMIT: '800' # changed lines, excluding lockfile + snapshots; see 02-product/task-decomposition.md
        run: |
          changed=$(git diff --numstat "$BASE" "$HEAD" -- . \
            ':(exclude)pnpm-lock.yaml' ':(exclude)**/*.snap' ':(exclude)**/__snapshots__/**' \
            | awk '{s += $1 + $2} END {print s + 0}')
          echo "Changed lines (excl. lockfile/snapshots): $changed (limit: $LIMIT)"
          if [ "$changed" -gt "$LIMIT" ]; then
            echo "::error::PR exceeds the size budget ($changed > $LIMIT lines). Split it — one concern per PR (02-product/task-decomposition.md)."
            exit 1
          fi

  enforcement-guard:
    name: Enforcement integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Enforcement floor intact (no weakened gates)
        run: bash scripts/check-enforcement.sh

  deps:
    name: Dependency audit + license allowlist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Vulnerability audit (high+ blocks)
        run: pnpm audit --prod --audit-level=high
      - name: License allowlist check (04-build/dependency-policy.md)
        # major-pinned so CLI flag drift can't silently break the gate
        run: >
          pnpm dlx license-checker-rseidelsohn@4 --production --excludePrivatePackages
          --onlyAllow "MIT;Apache-2.0;ISC;BSD-2-Clause;BSD-3-Clause;0BSD;BlueOak-1.0.0;CC0-1.0;Unlicense;Python-2.0"

  supply-chain:
    name: Supply chain (SBOM + dependency review)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      # PR-diff dependency review: blocks newly-introduced vulnerable deps and
      # disallowed licenses on the change itself (04-build/supply-chain.md,
      # complements the deps job's full-tree audit). OWASP Top 10:2025 supply chain.
      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          license-check: true
      # SBOM (CycloneDX) of the full dependency tree, retained as an artifact —
      # the inventory side of supply-chain provenance (SLSA / NIST SSDF). Build
      # provenance attestation lives in presets that publish a built artifact
      # (e.g. a container image); a serverless deploy has no artifact to attest.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          artifact-name: sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 30

  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload findings to the Security tab
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
      # Static application security testing (04-build/static-analysis.md). JS/TS
      # is interpreted, so no build step is needed before analysis.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - name: Analyze
        uses: github/codeql-action/analyze@v3

  migrations:
    name: Migration discipline guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Block edits/deletes of applied migrations (forward-only)
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          violations=$(git diff --name-status "$BASE" "$HEAD" -- ':(glob)drizzle/**/*.sql' | awk '$1 !~ /^A/ {print}')
          if [ -n "$violations" ]; then
            echo "::error::Applied migrations were modified or deleted — migrations are forward-only (06-delivery/migration-discipline.md):"
            echo "$violations"
            exit 1
          fi
          echo "Migration discipline OK (only additions, if any)."

  docs:
    name: Docs-updated check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require doc updates alongside code changes (label 'no-docs-needed' to waive)
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
          WAIVED: ${{ contains(github.event.pull_request.labels.*.name, 'no-docs-needed') }}
        run: |
          code=$(git diff --name-only "$BASE" "$HEAD" -- 'app/**' 'components/**' 'lib/**' 'db/**' 'src/**' | wc -l)
          docs=$(git diff --name-only "$BASE" "$HEAD" -- ':(glob)**/*.md' | wc -l)
          echo "code files changed: $code, markdown files changed: $docs, waived: $WAIVED"
          if [ "$code" -gt 0 ] && [ "$docs" -eq 0 ] && [ "$WAIVED" != "true" ]; then
            echo "::error::Code changed but no docs did (_spines/documentation.md). Update docs or add the 'no-docs-needed' label."
            exit 1
          fi

  build:
    name: Production build
    needs: [lint, typecheck, test, secrets, pr-size, deps, supply-chain, migrations, docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate env schema (boot validation against example values)
        run: pnpm exec tsx env.schema.ts
        env:
          ENV_VALIDATE_ONLY: 'true'
      - run: pnpm build

  site-integrity:
    name: Site integrity (multi-page coherence crawl)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build app
        run: pnpm build
      - name: Serve build + crawl for broken links / chrome drift / sitemap coherence
        # Enforces 03-design/multi-page-site-coherence.md. ALLOWED_404 is the
        # zero broken-internal-link budget (CAL-F01); raising it weakens the gate.
        # Server start + crawl live in ONE step so the backgrounded `next start`
        # survives (each `run:` is a fresh shell — a process backgrounded in a
        # prior step would not). The trap tears it down on any exit path.
        env:
          ALLOWED_404: '0'
        run: |
          pnpm start -- -p 3000 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -fsS -o /dev/null http://localhost:3000/ && break
            echo "waiting for server… ($i)"; sleep 2
          done
          bash scripts/check-site-integrity.sh http://localhost:3000

  lighthouse:
    name: Lighthouse CI (preview deploy)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Wait for Vercel preview deployment
        id: preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
      # Derive the full route list from the deployed sitemap so Lighthouse audits
      # EVERY route, not just home — the per-page baseline (05-verification/a11y-perf-gates.md
      # § Route coverage; 03-design/per-page-quality-baseline.md) is a site-wide bar.
      # Falls back to the bare preview URL if no sitemap is published.
      - name: Collect sitemap routes
        id: routes
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        run: |
          base="${PREVIEW_URL%/}"
          urls=$(curl -fsSL "$base/sitemap.xml" 2>/dev/null \
            | grep -oE '<loc>[^<]+</loc>' \
            | sed -E 's#</?loc>##g' || true)
          if [ -z "$urls" ]; then
            echo "No sitemap.xml found at $base — auditing the home route only." >&2
            urls="$base"
          fi
          {
            echo 'urls<<EOF'
            echo "$urls"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Lighthouse audit across every sitemap route
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.routes.outputs.urls }}
          uploadArtifacts: true
          # Budgets live with the repo so they are reviewable; see 05-verification/a11y-perf-gates.md.
          # The configPath thresholds apply identically to each audited route.
          configPath: ./lighthouserc.json

  smoke:
    name: Functional verification (smoke vs preview deploy)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium
      # The functional-verification covenant (_spines/functional-verification.md):
      # run the `smoke` Playwright project against the DEPLOYED artifact (the PR
      # preview), proving it boots, serves its routes, resolves its endpoints, logs
      # ZERO console errors, and a primary flow reaches its expected outcome —
      # before promotion. This is distinct from the unit/e2e tiers ("tests pass"
      # against a local build); it verifies the thing that will actually ship.
      - name: Wait for Vercel preview deployment
        id: preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
      - name: Smoke the preview deploy
        # SMOKE_MAX_CONSOLE_ERRORS pins the zero console-error budget (CAL-F02);
        # keep == the playwright.config.ts SMOKE_MAX_CONSOLE_ERRORS constant.
        # Raising it weakens the gate — do not.
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url }}
          SMOKE_MAX_CONSOLE_ERRORS: '0'
        run: pnpm exec playwright test --project=smoke
      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 14
