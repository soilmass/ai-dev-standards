# Local development services (04-build/developer-experience.md). Bring the local
# database up with `docker compose up -d`; production uses a managed database
# (06-delivery/deployment-strategy.md). Images are pinned (calibration CAL-D14) so
# local == CI == every teammate's machine. Local DATABASE_URL for .env.local:
#   postgresql://app:app@localhost:5432/app
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d app']
      interval: 5s
      timeout: 5s
      retries: 10
  adminer:
    image: adminer:5
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      db:
        condition: service_healthy
volumes:
  db-data:
