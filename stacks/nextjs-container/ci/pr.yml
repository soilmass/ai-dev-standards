# PR pipeline — runs on every pull request.
# Execution model (per 05-verification/ci-pipeline.md): sequential gating with
# parallel execution within each tier; unit tests + fast static checks first (fail fast),
# then build + preview-dependent gates.
#
# Tier 1 (parallel): lint+format, type check, unit/component tests (incl. a11y unit checks),
#                    secret scan, PR-size gate, dependency audit + license allowlist,
#                    supply-chain (SBOM + dependency review), migration-discipline guard,
#                    docs-updated check
# Tier 2 (after tier 1): production build
# Tier 3 (after tier 2): Lighthouse CI against the preview deploy
#
# Requires repo secrets: VERCEL_PREVIEW (set automatically by the Vercel GitHub
# integration as a deployment) — the Lighthouse job waits for that deployment URL.

name: PR

on:
  pull_request:
    branches: [main]
    # labeled/unlabeled included so the docs job's 'no-docs-needed' waiver
    # re-evaluates when the label is toggled — without them the waiver is inert.
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  lint:
    name: Lint & format (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Biome check (lint + format + import order)
        run: pnpm exec biome ci .

  typecheck:
    name: Type check (tsc, strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  test:
    name: Unit + component tests (Vitest, a11y included)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Vitest with coverage gate
        run: pnpm exec vitest run --coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so gitleaks scans every commit in the PR
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-size:
    name: PR size gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fail PRs over the one-concern size budget
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
          LIMIT: '800' # changed lines, excluding lockfile + snapshots; see 02-product/task-decomposition.md
        run: |
          changed=$(git diff --numstat "$BASE" "$HEAD" -- . \
            ':(exclude)pnpm-lock.yaml' ':(exclude)**/*.snap' ':(exclude)**/__snapshots__/**' \
            | awk '{s += $1 + $2} END {print s + 0}')
          echo "Changed lines (excl. lockfile/snapshots): $changed (limit: $LIMIT)"
          if [ "$changed" -gt "$LIMIT" ]; then
            echo "::error::PR exceeds the size budget ($changed > $LIMIT lines). Split it — one concern per PR (02-product/task-decomposition.md)."
            exit 1
          fi

  deps:
    name: Dependency audit + license allowlist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Vulnerability audit (high+ blocks)
        run: pnpm audit --prod --audit-level=high
      - name: License allowlist check (04-build/dependency-policy.md)
        # major-pinned so CLI flag drift can't silently break the gate
        run: >
          pnpm dlx license-checker-rseidelsohn@4 --production --excludePrivatePackages
          --onlyAllow "MIT;Apache-2.0;ISC;BSD-2-Clause;BSD-3-Clause;0BSD;BlueOak-1.0.0;CC0-1.0;Unlicense;Python-2.0"

  supply-chain:
    name: Supply chain (SBOM + dependency review)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      # PR-diff dependency review: blocks newly-introduced vulnerable deps and
      # disallowed licenses on the change itself (04-build/supply-chain.md,
      # complements the deps job's full-tree audit). OWASP Top 10:2025 supply chain.
      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          license-check: true
      # SBOM (CycloneDX) of the full dependency tree, retained as an artifact —
      # the inventory side of supply-chain provenance (SLSA / NIST SSDF). Build
      # provenance attestation lives in presets that publish a built artifact
      # (e.g. a container image); a serverless deploy has no artifact to attest.
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          artifact-name: sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 30

  migrations:
    name: Migration discipline guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Block edits/deletes of applied migrations (forward-only)
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          violations=$(git diff --name-status "$BASE" "$HEAD" -- ':(glob)prisma/migrations/**/*.sql' | awk '$1 !~ /^A/ {print}')
          if [ -n "$violations" ]; then
            echo "::error::Applied migrations were modified or deleted — migrations are forward-only (06-delivery/migration-discipline.md):"
            echo "$violations"
            exit 1
          fi
          echo "Migration discipline OK (only additions, if any)."

  docs:
    name: Docs-updated check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require doc updates alongside code changes (label 'no-docs-needed' to waive)
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
          WAIVED: ${{ contains(github.event.pull_request.labels.*.name, 'no-docs-needed') }}
        run: |
          code=$(git diff --name-only "$BASE" "$HEAD" -- 'app/**' 'components/**' 'lib/**' 'db/**' 'src/**' | wc -l)
          docs=$(git diff --name-only "$BASE" "$HEAD" -- ':(glob)**/*.md' | wc -l)
          echo "code files changed: $code, markdown files changed: $docs, waived: $WAIVED"
          if [ "$code" -gt 0 ] && [ "$docs" -eq 0 ] && [ "$WAIVED" != "true" ]; then
            echo "::error::Code changed but no docs did (_spines/documentation.md). Update docs or add the 'no-docs-needed' label."
            exit 1
          fi

  build:
    name: Production build
    needs: [lint, typecheck, test, secrets, pr-size, deps, supply-chain, migrations, docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate env schema (boot validation against example values)
        run: pnpm exec tsx env.schema.ts
        env:
          ENV_VALIDATE_ONLY: 'true'
      - run: pnpm build

  lighthouse:
    name: Lighthouse CI (preview deploy)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Wait for Vercel preview deployment
        id: preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
      - name: Lighthouse audit against preview URL
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.preview.outputs.url }}
          uploadArtifacts: true
          # Budgets live with the repo so they are reviewable; see 05-verification/a11y-perf-gates.md
          configPath: ./lighthouserc.json
